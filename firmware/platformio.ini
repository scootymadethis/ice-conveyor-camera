; PlatformIO project for the ESP32-S3-EYE pallet camera.
; Docs: https://docs.platformio.org/en/latest/platforms/espressif32.html

[env:esp32s3eye]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 9600
monitor_filters = esp32_exception_decoder

board_build.partitions = partitions.csv

; ESP32-S3-EYE: 8 MB flash, 8 MB *Octal* PSRAM.
; qio_opi = QIO flash + OPI (octal) PSRAM. Verify against your concrete board
; on first boot via the serial log ("PSRAM found: yes").
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB

build_flags =
  -DBOARD_HAS_PSRAM
  -DCAMERA_MODEL_ESP32S3_EYE
  -DCORE_DEBUG_LEVEL=3

lib_deps =
  bblanchon/ArduinoJson@^7.0.0
